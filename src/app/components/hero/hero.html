<section id="home" class="hero">
  <div class="hero-bg"></div>
  <div class="container hero-content">
    <div class="hero-text" appScrollReveal>
      <p class="hero-greeting">{{ lang.t().hero.greeting }}</p>
      <h1 class="hero-title">{{ lang.t().hero.role }}</h1>
      <p class="hero-subtitle">{{ lang.t().hero.subtitle }}</p>
      <div class="hero-actions">
        <a href="#contact" class="btn btn-primary">{{ lang.t().hero.cta }}</a>
        <a href="#projects" class="btn btn-outline">{{ lang.t().hero.ctaProjects }}</a>
      </div>
    </div>
    <div class="hero-image-wrapper" appScrollReveal>
      <div class="hero-image-ring">
        <img src="assets/profile.png" alt="David Corrales" class="hero-image" />
      </div>
    </div>
  </div>
</section>
