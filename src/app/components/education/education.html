<section id="education" class="education">
  <div class="container">
    <div appScrollReveal>
      <h2 class="section-title"><span>#</span> {{ lang.t().education.title }}</h2>
    </div>
    <div class="education-card card" appScrollReveal>
      <div class="education-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
          <path d="M6 12v5c0 1.5 2.7 3 6 3s6-1.5 6-3v-5"/>
        </svg>
      </div>
      <div class="education-info">
        <h3 class="education-degree">{{ lang.t().education.degree }}</h3>
        <p class="education-university">{{ lang.t().education.university }}</p>
        <span class="education-status tag">{{ lang.t().education.status }}</span>
      </div>
    </div>
  </div>
</section>
