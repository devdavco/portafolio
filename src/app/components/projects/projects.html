<section id="projects" class="projects">
  <div class="container">
    <div appScrollReveal>
      <h2 class="section-title"><span>#</span> {{ lang.t().projects.title }}</h2>
      <p class="section-subtitle">{{ lang.t().projects.subtitle }}</p>
    </div>
    <div class="projects-grid">
      @for (item of placeholders; track item) {
        <div class="project-card card" appScrollReveal>
          <div class="project-placeholder-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
          </div>
          <h3 class="project-title">{{ lang.t().projects.placeholder }} {{ item }}</h3>
          <p class="project-desc">{{ lang.t().projects.comingSoon }}</p>
          <div class="project-tags">
            <span class="tag">---</span>
          </div>
        </div>
      }
    </div>
  </div>
</section>
